"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$directory$os$git_branch$git_status$nodejs$rust$golang$php $character"

[line_break]
disabled = true


[directory]
style = "bold cyan"
truncate_to_repo = false
truncation_length = 0
repo_root_style = "purple"
use_logical_path = false
format = "[$path]($style) "
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($repo_root_style) "

[os]
disabled = false
format = "[$symbol](#blue) "

[os.symbols]
Fedora  = " "
Ubuntu  = "󰕈"
Artix   = "󰣇"
Arch    = "󰣇"
CachyOS = "󰣇"
Macos   = ""

# [directory]
# format            = "[$path](cyan) "
# truncation_length = 4
# truncate_to_repo  = true

[git_branch]
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "
style = "bold dimmed green"

[git_status]
style = "bold red"
format     = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead      = "[⇡$count ](bold cyan)"
behind     = "[⇣$count ](bold cyan)"
diverged   = "[⇡$ahead_count⇣$behind_count ](bold cyan)"
staged     = "[+$count ](bold green)"
modified   = "[●$count ](bold yellow)"
untracked  = "[?$count ](bold white)"
deleted    = "[✘$count ](bold red)"
conflicted = "[⚡$count ](bold red)"

[nodejs]
symbol = ""
format = "[$symbol $version](green) "

[rust]
symbol = ""
format = "[$symbol $version](red) "

[golang]
symbol = ""
format = "[$symbol $version](cyan) "

[php]
symbol = ""
format = "[$symbol $version](purple) "

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](blue)"
